<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Analyzer — Compiler Construction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #1a1a2e;
            --ink2: #16213e;
            --paper: #f5f0e8;
            --paper2: #ede8df;
            --accent: #c84b31;
            --accent2: #2d6a4f;
            --rule: #c8c0b0;
            --text: #2c2c3e;
            --muted: #7a7060;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'DM Sans', sans-serif;
        }

        body {
            font-family: var(--sans);
            background-color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Halftone dot background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(200,75,49,0.12) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
        }

        /* Diagonal stripe accent */
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            right: -20%;
            width: 50vw;
            height: 200vh;
            background: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 18px,
                rgba(200,75,49,0.04) 18px,
                rgba(200,75,49,0.04) 19px
            );
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;
            background: var(--paper);
            width: 480px;
            border-radius: 2px;
            overflow: hidden;
            box-shadow:
                0 0 0 1px var(--rule),
                8px 8px 0 0 var(--accent),
                16px 16px 0 0 rgba(200,75,49,0.15);
        }

        /* Red top bar */
        .card-header {
            background: var(--accent);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header .dots {
            display: flex; gap: 6px;
        }
        .card-header .dots span {
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(255,255,255,0.3);
        }

        .card-header .label {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-left: auto;
        }

        .card-body {
            padding: 36px 36px 32px;
        }

        /* Rule lines like a notebook */
        .card-body::before {
            content: '';
            position: absolute;
            left: 60px;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(200,75,49,0.2);
            pointer-events: none;
        }

        .tag-line {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
        }

        h1 {
            font-family: var(--sans);
            font-size: 34px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.1;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        h1 em {
            font-style: normal;
            color: var(--accent);
        }

        .course {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 28px;
            padding-bottom: 22px;
            border-bottom: 1px solid var(--rule);
            letter-spacing: 0.5px;
        }

        .section-label {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .members-block {
            margin-bottom: 28px;
        }

        .member-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--rule);
        }
        .member-row:first-child {
            border-top: 1px solid var(--rule);
        }

        .member-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        .member-id {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            background: var(--paper2);
            padding: 2px 8px;
            border-radius: 2px;
            border: 1px solid var(--rule);
        }

        .btn-start {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--ink);
            color: #fff;
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-start::after {
            content: '→';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            transition: right 0.2s;
        }

        .btn-start:hover {
            background: var(--accent);
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 var(--ink);
        }

        .btn-start:hover::after {
            right: 14px;
        }

        .btn-start:active {
            transform: translate(0, 0);
            box-shadow: none;
        }

        .card-footer {
            background: var(--paper2);
            border-top: 1px solid var(--rule);
            padding: 10px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-footer span {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .status-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent2);
            margin-right: 5px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <div class="dots">
            <span></span><span></span><span></span>
        </div>
        <div class="label">CS-310 · Spring 2026</div>
    </div>

    <div class="card-body">
        <div class="tag-line">Compiler Construction Project</div>
        <h1>Token<br><em>Analyzer</em></h1>
        <div class="course">W++ Language · Lexical Analysis Tool</div>

        <div class="members-block">
            <div class="section-label">Group Members</div>

            <div class="member-row">
                <span class="member-name">Afreen Gul</span>
                <span class="member-id">23-CS-84</span>
            </div>
            <div class="member-row">
                <span class="member-name">Shameen Shams</span>
                <span class="member-id">23-CS-07</span>
            </div>
            <div class="member-row">
                <span class="member-name">Areeba Ali</span>
                <span class="member-id">23-CS-114</span>
            </div>
        </div>

        <button class="btn-start" onclick="startProject()">Start Analysis</button>
    </div>

    <div class="card-footer">
        <span><span class="status-dot"></span>Client-side · No data sent</span>
        <span>UET Rawalpindi</span>
    </div>
</div>

<script>
    function startProject() {
        window.location.href = "upload.html";
    }
</script>

</body>
</html>
